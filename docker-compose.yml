services:
  be0-utilities:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: be0-utilities
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - APP_NAME=BE0 Shared Services
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost:9000}
      - APP_TIMEZONE=Asia/Kuala_Lumpur
      - DB_CONNECTION=mysql
      - DB_HOST=osc-mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-osc_pelesenan}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=osc-redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - CACHE_PREFIX=be0_
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./storage:/var/www/storage
    networks:
      - osc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  osc-network:
    external: true
